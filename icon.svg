<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#050a14"/>
  <!-- Stars -->
  <circle cx="80"  cy="70"  r="5" fill="white" opacity="0.9"/>
  <circle cx="430" cy="100" r="3" fill="white" opacity="0.7"/>
  <circle cx="120" cy="400" r="4" fill="white" opacity="0.8"/>
  <circle cx="460" cy="380" r="5" fill="white" opacity="0.6"/>
  <circle cx="50"  cy="300" r="3" fill="white" opacity="0.7"/>
  <circle cx="390" cy="440" r="3" fill="white" opacity="0.8"/>
  <circle cx="200" cy="80"  r="2" fill="white" opacity="0.6"/>
  <circle cx="340" cy="60"  r="4" fill="white" opacity="0.9"/>
  <!-- Planet body -->
  <circle cx="256" cy="256" r="130" fill="#1a3a7a"/>
  <circle cx="256" cy="256" r="130" fill="url(#pg)"/>
  <!-- Ring -->
  <ellipse cx="256" cy="270" rx="210" ry="48" fill="none" stroke="#c8a050" stroke-width="18" opacity="0.85"/>
  <!-- Ring clipped over planet (front half) -->
  <clipPath id="front"><rect x="56" y="270" width="400" height="130"/></clipPath>
  <ellipse cx="256" cy="270" rx="210" ry="48" fill="none" stroke="#e0b860" stroke-width="18" clip-path="url(#front)" opacity="0.95"/>
  <!-- Subtle planet shading -->
  <defs>
    <radialGradient id="pg" cx="38%" cy="35%">
      <stop offset="0%"   stop-color="#4a7acc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#050a14" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
</svg>
